<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Потужнометр 2.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(45deg, #0a0f2a, #0a1a2a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Impact', system-ui, sans-serif;
        }
        .container {
            position: relative;
            width: 100%;
            max-width: 500px;
            background: #000000aa;
            border-radius: 2rem;
            margin: 1rem;
            backdrop-filter: blur(4px);
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid #ffd966;
        }
        video, canvas {
            width: 100%;
            display: block;
            border-radius: 1.5rem;
            transform: scaleX(-1); /* дзеркально як дзеркало */
        }
        .video-wrapper {
            position: relative;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }
        .power-bar {
            margin: 1rem;
            background: #222;
            border-radius: 100px;
            height: 35px;
            overflow: hidden;
            box-shadow: inset 0 1px 4px #000;
        }
        .power-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #2ecc71, #f1c40f, #e67e22, #e74c3c);
            transition: width 0.1s linear;
            border-radius: 100px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 12px;
            color: white;
            font-weight: bold;
            text-shadow: 0 0 3px black;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            padding: 0 1rem 1rem;
            color: #ffecb3;
            font-weight: bold;
        }
        button {
            background: #2c3e66;
            border: none;
            color: white;
            font-weight: bold;
            padding: 12px 20px;
            margin: 0 1rem 1rem;
            border-radius: 60px;
            font-size: 1rem;
            width: calc(100% - 2rem);
            cursor: pointer;
            transition: 0.2s;
            font-family: monospace;
            letter-spacing: 1px;
        }
        button:active {
            transform: scale(0.97);
            background: #e67e22;
        }
        .explosion-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            display: none;
            background: radial-gradient(circle, rgba(255,100,0,0.6), rgba(0,0,0,0));
            animation: bang 0.6s ease-out;
        }
        @keyframes bang {
            0% { opacity: 1; transform: scale(1); background-size: 0% 0%;}
            100% { opacity: 0; transform: scale(1.2); background-size: 200% 200%;}
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #000000bb;
            backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 12px;
            text-align: center;
            color: gold;
            font-size: 0.8rem;
            z-index: 1000;
            font-family: monospace;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="video-wrapper">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
    </div>
    <div class="power-bar">
        <div class="power-fill" id="powerFill">0%</div>
    </div>
    <div class="stats">
        <span>💛💙 ПОТУЖНІСТЬ:</span>
        <span id="powerPercent">0 %</span>
    </div>
    <button id="resetBtn">🔁 ЗАМІРЯТИ ЗНОВУ (скинути блокування)</button>
</div>
<div id="explosionOverlay" class="explosion-overlay"></div>
<div id="toastMessage" class="toast" style="display: none;"></div>

<script>
    (function(){
        // ----- налаштування кольорів (синій/жовтий у HSV діапазонах)
        // Жовтий (світлий жовто-золотистий)
        const yellowLow = [20, 100, 100];   // H, S, V мін
        const yellowHigh = [35, 255, 255];
        // Синій (синьо-жовтий український)
        const blueLow = [90, 80, 80];
        const blueHigh = [130, 255, 255];

        let stream = null;
        let animationId = null;
        let lastExplosionTime = 0;
        const EXPLOSION_COOLDOWN = 3500; // мс
        let currentPower = 0;

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const powerFill = document.getElementById('powerFill');
        const powerPercentSpan = document.getElementById('powerPercent');
        const resetBtn = document.getElementById('resetBtn');
        const explosionOverlay = document.getElementById('explosionOverlay');
        const toast = document.getElementById('toastMessage');

        function showToast(msg, duration=2000) {
            toast.style.display = 'block';
            toast.innerText = msg;
            setTimeout(() => {
                toast.style.display = 'none';
            }, duration);
        }

        // голос
        function speakLikeZelensky(text) {
            if (!window.speechSynthesis) return;
            // якщо вже щось говорить – зупинити
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'uk-UA';
            utterance.rate = 0.85;
            utterance.pitch = 0.65;   // нижчий голос + трохи втоми
            utterance.volume = 1;
            utterance.text = text;
            window.speechSynthesis.speak(utterance);
        }

        function explode() {
            const now = Date.now();
            if (now - lastExplosionTime < EXPLOSION_COOLDOWN) {
                showToast("💥 Занадто багато вибухів! Зачекайте...");
                return false;
            }
            lastExplosionTime = now;
            
            // ефект вібрації (якщо підтримується)
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            
            // анімація вибуху
            explosionOverlay.style.display = 'block';
            setTimeout(() => {
                explosionOverlay.style.display = 'none';
            }, 700);
            
            // фраза максимально смішна, стиль Зеленського
            speakLikeZelensky("Слишком сильная потужность в воздухе, ё-моё! Я не политик, но это перебор.");
            showToast("💣 ВИБУХ! ПОТУЖНІСТЬ 100%", 2500);
            
            // Скидання показника після вибуху (щоб не детонило миттєво знову)
            currentPower = 0;
            updatePowerUI(0);
            return true;
        }

        function updatePowerUI(power) {
            let p = Math.min(100, Math.max(0, Math.floor(power)));
            powerFill.style.width = p + '%';
            powerFill.innerText = p+'%';
            powerPercentSpan.innerText = p+' %';
            if(p >= 99.5 && (Date.now() - lastExplosionTime > EXPLOSION_COOLDOWN)) {
                // майже 100% - вибухаємо
                explode();
            }
        }

        // аналіз кадру: повертає відсоток "потужності" (0-100) на основі площі синіх+жовтих пікселів
        function analyzePowerFromFrame(imageData, width, height) {
            let yellowCount = 0;
            let blueCount = 0;
            const data = imageData.data;
            // перебираємо кожен піксель RGB -> приблизний HSV поріг (швидко)
            for(let i=0; i<data.length; i+=4) {
                let r = data[i];
                let g = data[i+1];
                let b = data[i+2];
                
                // спрощена перевірка на жовтий: R+G високий, B низький
                let isYellow = (r > 150 && g > 150 && b < 100);
                // синій: B високий, R,G середні
                let isBlue = (b > 100 && r < 130 && g < 150 && (r+g) < 220);
                
                if(isYellow) yellowCount++;
                if(isBlue) blueCount++;
            }
            // Важливіше, щоб були обидва кольори разом (симуляція флага)
            let totalPixels = width * height;
            let yellowRatio = yellowCount / totalPixels;
            let blueRatio = blueCount / totalPixels;
            
            // Якщо одночасно присутній і жовтий і синій у достатній кількості
            let flagScore = (yellowRatio + blueRatio);
            // коефіцієнт: чим більше пікселів обох кольорів, тим потужність вища
            let power = Math.min(100, Math.floor(flagScore * 400));  // 0.25 -> 100%
            if(yellowRatio<0.02 || blueRatio<0.02) power = Math.min(power, 15); // якщо одного кольору дуже мало
            return power;
        }

        function processFrame() {
            if(!video.videoWidth || !video.videoHeight) {
                requestAnimationFrame(processFrame);
                return;
            }
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let power = analyzePowerFromFrame(frame, canvas.width, canvas.height);
            
            // згладжування зміни потужності (трохи)
            currentPower = currentPower * 0.6 + power * 0.4;
            updatePowerUI(currentPower);
            
            // Малюємо контури для приколу: обведемо знайдені зони (опціонально)
            // Додатково малюємо кола жовтий та синій
            ctx.putImageData(frame, 0, 0);
            ctx.globalAlpha = 0.4;
            ctx.strokeStyle = '#ffdd44';
            ctx.lineWidth = 3;
            // просто покажемо накладення для відчуття роботи
            requestAnimationFrame(processFrame);
        }

        async function setupCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                await video.play();
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                processFrame();
                showToast("📷 Камера готова! Шукайте жовто-синє.", 2000);
            } catch(err) {
                console.error(err);
                showToast("❌ Помилка доступу до камери. Дозвольте камеру.", 3000);
                document.body.innerHTML += '<div style="color:red;text-align:center">Не вдалося отримати камеру. Спробуйте в HTTPS або надайте дозвіл.</div>';
            }
        }

        function resetCooldown() {
            lastExplosionTime = 0;
            currentPower = 0;
            updatePowerUI(0);
            showToast("🔄 Потужність скинута. Можна знову вибухати!");
        }

        resetBtn.addEventListener('click', resetCooldown);

        setupCamera();
    })();
</script>
</body>
</html>
