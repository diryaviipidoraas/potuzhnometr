<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Потужнометр 2.0 — ФІКС</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: linear-gradient(145deg, #0a0f2a, #030617);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .container {
            max-width: 520px;
            width: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            margin: 1rem;
            overflow: hidden;
            border: 1px solid #ffd966;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
        }
        .video-wrapper {
            position: relative;
        }
        video, canvas {
            width: 100%;
            display: block;
            transform: scaleX(-1);
            border-radius: 1.5rem;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }
        .power-bar {
            margin: 1rem;
            background: #1e1e2f;
            border-radius: 100px;
            height: 40px;
            overflow: hidden;
            box-shadow: inset 0 2px 5px #00000055;
        }
        .power-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #2ecc71, #f1c40f, #e67e22, #e74c3c);
            transition: width 0.05s linear;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 16px;
            color: white;
            font-weight: bold;
            text-shadow: 0 0 3px black;
            font-size: 1.1rem;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            padding: 0 1rem 1rem;
            color: #ffecb3;
            font-weight: bold;
            font-size: 1.1rem;
        }
        button {
            background: #2c3e66;
            border: none;
            color: white;
            font-weight: bold;
            padding: 14px 20px;
            margin: 0 1rem 1.2rem;
            border-radius: 60px;
            width: calc(100% - 2rem);
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
            font-family: monospace;
        }
        button:active {
            transform: scale(0.97);
            background: #e67e22;
        }
        .explosion-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle, rgba(255,100,0,0.8), transparent);
            opacity: 0;
            transition: opacity 0.1s ease;
            z-index: 999;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #000000cc;
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 12px;
            text-align: center;
            color: gold;
            font-weight: bold;
            font-size: 0.9rem;
            z-index: 1000;
            font-family: monospace;
            display: none;
        }
        .footer {
            text-align: center;
            font-size: 0.7rem;
            color: #aaa;
            padding-bottom: 0.8rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="video-wrapper">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
    </div>
    <div class="power-bar">
        <div class="power-fill" id="powerFill">0%</div>
    </div>
    <div class="stats">
        <span>💛💙 ПОТУЖНІСТЬ:</span>
        <span id="powerPercent">0 %</span>
    </div>
    <button id="enableAudioBtn">🔊 АКТИВУВАТИ ЗВУК (натисни мене)</button>
    <div class="footer">🎤 Натисніть кнопку, щоб почути голос при вибуху</div>
</div>
<div id="explosionOverlay" class="explosion-overlay"></div>
<div id="toastMessage" class="toast"></div>

<script>
    (function() {
        // ---------- НАЛАШТУВАННЯ ----------
        const EXPLOSION_THRESHOLD = 95;   // % при якому бахає (було 99.5 - тепер 95)
        const COOLDOWN_MS = 3500;         // затримка між вибухами
        
        // DOM елементи
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const powerFill = document.getElementById('powerFill');
        const powerSpan = document.getElementById('powerPercent');
        const explosionDiv = document.getElementById('explosionOverlay');
        const toast = document.getElementById('toastMessage');
        const enableBtn = document.getElementById('enableAudioBtn');
        
        // Змінні стану
        let audioEnabled = false;
        let lastExplosionTime = 0;
        let currentPower = 0;
        let animationFrameId = null;
        
        // Допоміжна функція для повідомлень
        function showToast(msg, duration = 2500) {
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, duration);
        }
        
        // Голос (стилізований під Зеленського)
        function speakZelensky(text) {
            if (!audioEnabled) {
                console.warn("⚠️ Звук не активовано. Натисніть кнопку!");
                showToast("🔇 Спочатку натисни «Активувати звук»", 2000);
                return;
            }
            // Зупиняємо попередню мову, щоб не накладалось
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'uk-UA';
            utterance.rate = 0.85;
            utterance.pitch = 0.65;   // низький, втомлений голос
            utterance.volume = 1;
            window.speechSynthesis.speak(utterance);
        }
        
        // Ефект вибуху
        function explode() {
            const now = Date.now();
            if (now - lastExplosionTime < COOLDOWN_MS) return;
            lastExplosionTime = now;
            
            console.log("💥💥💥 ВИБУХ! ПОТУЖНІСТЬ ДОСЯГЛА", currentPower.toFixed(1), "%");
            
            // Вібрація
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            
            // Анімація вибуху
            explosionDiv.style.opacity = '1';
            setTimeout(() => {
                explosionDiv.style.opacity = '0';
            }, 600);
            
            // Голосова фраза
            speakZelensky("Слишком сильная потужность в воздухе, ё-моё! Я не политик, но это перебор.");
            showToast("💣 БАХ! ПОТУЖНІСТЬ 100%", 2500);
            
            // Не скидаємо шкалу відразу, але можна було б. 
            // Якщо хочеш скидати - розкоментуй:
            // currentPower = 0;
            // updatePowerUI(0);
        }
        
        // Оновлення інтерфейсу та перевірка вибуху
        function updatePowerUI(power) {
            let intPower = Math.min(100, Math.max(0, Math.floor(power)));
            powerFill.style.width = intPower + '%';
            powerFill.innerText = intPower + '%';
            powerSpan.innerText = intPower + ' %';
            
            // ГОЛОВНА УМОВА: якщо потужність >= порогу і минув холодоун
            if (intPower >= EXPLOSION_THRESHOLD && (Date.now() - lastExplosionTime >= COOLDOWN_MS)) {
                explode();
            }
        }
        
        // Аналіз кадру: повертає відсоток від 0 до 100 на основі площі жовтого+синього
        function analyzePowerFromImageData(imageData, width, height) {
            let yellowCount = 0;
            let blueCount = 0;
            const data = imageData.data;
            const len = data.length;
            
            for (let i = 0; i < len; i += 4) {
                const r = data[i];
                const g = data[i+1];
                const b = data[i+2];
                
                // Спрощене виявлення жовтого (яскравий жовтогарячий)
                const isYellow = (r > 160 && g > 150 && b < 120);
                // Синій (яскравий синій, низький червоний/зелений)
                const isBlue = (b > 130 && r < 140 && g < 160 && (r+g) < 250);
                
                if (isYellow) yellowCount++;
                if (isBlue) blueCount++;
            }
            
            const totalPixels = width * height;
            const yellowRatio = yellowCount / totalPixels;
            const blueRatio = blueCount / totalPixels;
            
            // Якщо обох кольорів мало - зменшуємо чутливість
            if (yellowRatio < 0.01 || blueRatio < 0.01) return 0;
            
            // Сума часток -> максимально до 100% (при 0.25 суми дає 100%)
            let rawPower = Math.min(100, Math.floor((yellowRatio + blueRatio) * 400));
            return rawPower;
        }
        
        // Головний цикл обробки кадрів
        function processFrame() {
            if (!video.videoWidth || !video.videoHeight) {
                animationFrameId = requestAnimationFrame(processFrame);
                return;
            }
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let newPower = analyzePowerFromImageData(frame, canvas.width, canvas.height);
            
            // Плавність (щоб не смикалось)
            currentPower = currentPower * 0.6 + newPower * 0.4;
            if (currentPower < 1) currentPower = 0;
            
            updatePowerUI(currentPower);
            
            animationFrameId = requestAnimationFrame(processFrame);
        }
        
        // Ініціалізація камери
        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                await video.play();
                showToast("📷 Камера готова! Натисніть кнопку звуку.", 2000);
                processFrame();
            } catch (err) {
                console.error(err);
                alert("Помилка доступу до камери. Дайте дозвіл або використовуйте HTTPS.");
            }
        }
        
        // Активація звуку по кнопці
        enableBtn.addEventListener('click', () => {
            audioEnabled = true;
            // невеликий "пустий" звук, щоб розблокувати audio context (хоча для speech це менш критично)
            const test = new SpeechSynthesisUtterance(" ");
            test.lang = "uk-UA";
            window.speechSynthesis.speak(test);
            showToast("🔊 Звук активовано! Тепер при вибуху буде голос.", 2000);
            console.log("Audio enabled by user");
        });
        
        // Запуск
        setupCamera();
    })();
</script>
</body>
</html>
